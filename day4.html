<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2 class="logo">MyDash</h2>
    <nav>
      <a href="#">Dashboard</a>
      <a href="#">Analytics</a>
      <a href="#">Projects</a>
      <a href="#">Users</a>
      <a href="#">Settings</a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main">

    <!-- Topbar -->
    <header class="topbar">
      <input type="text" placeholder="Search..." />
      <div class="user">
        <span>👤</span>
        <p>Tharani</p>
      </div>
    </header>

    <!-- Cards -->
    <section class="cards">
      <div class="card">
        <h3>Total Users</h3>
        <p>1,245</p>
      </div>
      <div class="card">
        <h3>Revenue</h3>
        <p>$8,430</p>
      </div>
      <div class="card">
        <h3>Orders</h3>
        <p>320</p>
      </div>
      <div class="card">
        <h3>Growth</h3>
        <p>+18%</p>
      </div>
    </section>

    <!-- Table -->
    <section class="table-section">
      <h2>Recent Activities</h2>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Status</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Project Alpha</td>
            <td>Completed</td>
            <td>12 Mar</td>
          </tr>
          <tr>
            <td>Project Beta</td>
            <td>Pending</td>
            <td>14 Mar</td>
          </tr>
          <tr>
            <td>Project Gamma</td>
            <td>In Progress</td>
            <td>16 Mar</td>
          </tr>
        </tbody>
      </table>
    </section>

  </main>

</div>

</body>
</html>
